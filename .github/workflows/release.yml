name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write          # required to create the GitHub Release

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  packages:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install build + packaging deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libx11-dev libxfixes-dev \
            libwayland-dev \
            debhelper devscripts lintian
          # nfpm from the goreleaser apt repo
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' \
            | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt-get update
          sudo apt-get install -y nfpm

      - name: Sync debian/changelog to the tag version
        env:
          DEBEMAIL: j.vidal.rodriguez@gmail.com
          DEBFULLNAME: J Vidal
        run: dch -b -v "${{ steps.ver.outputs.version }}-1" --distribution unstable
                 "Release ${{ steps.ver.outputs.version }}"

      - name: Build native .deb (auto-resolved deps, lintian-checked)
        run: |
          dpkg-buildpackage -us -uc -b
          mkdir -p dist
          mv ../cpclip_*.deb dist/
          lintian dist/cpclip_*.deb || true     # informational, non-blocking

      - name: Build .rpm + .apk with nfpm
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          make install DESTDIR="$PWD/staging" PREFIX=/usr
          nfpm package --packager rpm --target dist/
          nfpm package --packager apk --target dist/

      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.apk
            dist/SHA256SUMS
          generate_release_notes: true
